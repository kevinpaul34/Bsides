<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSides Tampa 2026 — Sponsorship Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111; color: #f0f0f0; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo-dot { width: 14px; height: 40px; background: #e8314a; border-radius: 3px; }
  h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #888; margin-top: 4px; }
  .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin: 1.5rem 0 0.75rem; }
  .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
  .tier-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .tier-card:hover { border-color: #444; transform: translateY(-1px); }
  .tier-card.selected { border: 2px solid #e8314a; background: #1e1218; }
  .tier-name { font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px; }
  .tier-price { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #e8314a; }
  .tier-price.free { color: #2ecc71; }
  .tier-avail { font-size: 11px; color: #555; }
  .special-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .special-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
  .special-card:hover { border-color: #444; }
  .special-card.selected { border: 2px solid #e8314a; background: #1e1218; }
  .detail { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; padding: 1.25rem 1.5rem; margin-top: 1.5rem; display: none; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .detail.visible { display: block; }
  .detail-header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid #2a2a2a; }
  .detail-name { font-size: 20px; font-weight: 700; color: #fff; }
  .detail-price { font-size: 16px; color: #e8314a; font-weight: 600; }
  .detail-badge { font-size: 11px; background: #2a1a1e; color: #e8314a; border: 1px solid #3a1a22; border-radius: 20px; padding: 3px 10px; }
  .benefit-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #222; font-size: 14px; }
  .benefit-row:last-of-type { border-bottom: none; }
  .benefit-label { color: #aaa; }
  .check { color: #2ecc71; font-size: 15px; }
  .contact { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid #2a2a2a; font-size: 13px; color: #666; }
  .contact a { color: #e8314a; text-decoration: none; }
  .contact a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="logo-dot"></div>
      <h1>BSides Tampa 2026</h1>
    </div>
    <p class="subtitle">Sponsorship Explorer &nbsp;·&nbsp; May 15–16 &nbsp;·&nbsp; Marshall Student Center, USF &nbsp;·&nbsp; ~2,500 attendees</p>
  </header>

  <div class="section-label">Main tiers — tap to explore</div>
  <div class="tier-grid" id="mainGrid"></div>

  <div class="section-label">Specialty sponsorships — $1,000 each</div>
  <div class="special-grid" id="specialGrid"></div>

  <div class="detail" id="detail"></div>
</div>

<script>
const tiers = [
  { id: 'diamond', name: 'Diamond', price: '$15,000', avail: '1 available', benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '30 event tickets', 'Large/top logo on shirts', 'Bag inserts', 'Booth — best foot traffic', 'Logo on bags', 'Lanyard logo', 'Happy hour banner/sponsor', 'Customized BSides stickers', 'Logo on speakers podium'] },
  { id: 'platinum', name: 'Platinum', price: '$10,000', avail: '3 available', benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '20 event tickets', 'Large/top logo on shirts', 'Bag inserts', 'Booth — better foot traffic', 'Logo on bags', 'Lanyard logo', 'Logo on speakers podium'] },
  { id: 'gold', name: 'Gold', price: '$8,000', avail: '6 available', benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '15 event tickets', 'Medium/middle logo on shirts', 'Bag inserts', 'Booth — good foot traffic', 'Logo on bags'] },
  { id: 'silver', name: 'Silver', price: '$5,000', avail: '10 available', benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '10 event tickets', 'Small/low logo on shirts', 'Bag inserts', 'Booth — basic foot traffic'] },
  { id: 'bronze', name: 'Bronze', price: '$1,000', avail: '10 available', benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '5 event tickets'] },
  { id: 'nonprofit', name: 'Non-Profit', price: 'Free', avail: '5 available', free: true, benefits: ['Logo advertised', 'Social media shoutouts', 'Logo on event website', '2 event tickets', 'Booth'] },
];

const specials = [
  { id: 'energy', name: 'Energy / Refreshments', desc: 'Logo on coffee cups or sleeves', avail: '4 available' },
  { id: 'arcade', name: 'Arcade', desc: 'Ad banner next to arcade games', avail: '1 available' },
  { id: 'lockpick', name: 'Lockpick Village', desc: 'Logo banner in village area + logo on website', avail: '1 available' },
];

let selected = null;
let selectedSpecial = null;

function renderMainGrid() {
  document.getElementById('mainGrid').innerHTML = tiers.map(t => `
    <div class="tier-card ${selected === t.id ? 'selected' : ''}" onclick="selectTier('${t.id}')">
      <div class="tier-name">${t.name}</div>
      <div class="tier-price ${t.free ? 'free' : ''}">${t.price}</div>
      <div class="tier-avail">${t.avail}</div>
    </div>`).join('');
}

function renderSpecialGrid() {
  document.getElementById('specialGrid').innerHTML = specials.map(s => `
    <div class="special-card ${selectedSpecial === s.id ? 'selected' : ''}" onclick="selectSpecial('${s.id}')">
      <div class="tier-name">${s.name}</div>
      <div class="tier-avail" style="margin-top:5px;">${s.avail}</div>
    </div>`).join('');
}

function selectTier(id) {
  selected = selected === id ? null : id;
  selectedSpecial = null;
  renderMainGrid(); renderSpecialGrid(); renderDetail();
}

function selectSpecial(id) {
  selectedSpecial = selectedSpecial === id ? null : id;
  selected = null;
  renderMainGrid(); renderSpecialGrid(); renderDetail();
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (!selected && !selectedSpecial) { el.className = 'detail'; return; }

  if (selectedSpecial) {
    const s = specials.find(x => x.id === selectedSpecial);
    el.innerHTML = `
      <div class="detail-header">
        <span class="detail-name">${s.name} sponsor</span>
        <span class="detail-price">$1,000</span>
        <span class="detail-badge">${s.avail}</span>
      </div>
      <div class="benefit-row"><span class="benefit-label">${s.desc}</span><span class="check">✓</span></div>
      <div class="contact">To claim this spot: <a href="mailto:sponsorship@bsidestampa.net">sponsorship@bsidestampa.net</a> · <a href="https://bsidestampa.net" target="_blank">bsidestampa.net</a></div>`;
  } else {
    const t = tiers.find(x => x.id === selected);
    el.innerHTML = `
      <div class="detail-header">
        <span class="detail-name">${t.name}</span>
        <span class="detail-price">${t.price}</span>
        <span class="detail-badge">${t.avail}</span>
      </div>
      ${t.benefits.map(b => `<div class="benefit-row"><span class="benefit-label">${b}</span><span class="check">✓</span></div>`).join('')}
      <div class="contact">Questions: <a href="mailto:sponsorship@bsidestampa.net">sponsorship@bsidestampa.net</a> · <a href="https://bsidestampa.net" target="_blank">bsidestampa.net</a></div>`;
  }

  el.className = 'detail visible';
}

renderMainGrid();
renderSpecialGrid();
</script>
</body>
</html>
